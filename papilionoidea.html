*{box-sizing:border-box}

.wrap{max-width:1120px;margin:0 auto;padding:20px 18px 60px}
h1{font-size:22px;font-weight:700;margin:0 0 3px}
.sub{font-size:13px;color:var(--sub);margin:0 0 16px;line-height:1.5}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{font-size:13px;padding:7px 14px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:20px;cursor:pointer;font-family:inherit}
.tab.on{background:var(--green);color:#fff;border-color:var(--green)}
.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;font-size:12.5px}
.tools input{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);width:150px}
.chip{font-size:12px;padding:5px 10px;border-radius:16px;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--ink);font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.chip.on{color:#fff}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.lens{margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;color:var(--sub)}
.stage{display:grid;grid-template-columns:1fr 268px;gap:14px}
@media(max-width:760px){.stage{grid-template-columns:1fr}}
.canvas{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:auto;max-height:74vh;position:relative}
svg{display:block;width:100%;height:auto}
.detail{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:14px 15px;font-size:13px;max-height:74vh;overflow:auto}
.detail h3{margin:0 0 2px;font-size:15px}
.detail .k{color:var(--sub);font-size:12px;margin:10px 0 3px}
.detail .sci{font-style:italic;color:var(--sub);font-size:12px}
.pill{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;margin:2px 3px 0 0;background:var(--bg);border:1px solid var(--line)}
.pill.end{color:var(--green);border-color:var(--green2)}
.pill.con{color:var(--red);border-color:var(--red)}
.hostrow{padding:3px 0;border-bottom:1px dashed var(--line)}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin:2px 0 10px;font-size:12px;color:var(--sub)}
.legend span{display:flex;align-items:center;gap:5px}
.node-t{font-size:12.5px;fill:var(--ink);cursor:pointer}
.node-s{font-size:9.5px;fill:var(--sub);font-style:italic}
.hd{font-size:11px;fill:var(--sub)}
.tip{position:fixed;pointer-events:none;background:var(--ink);color:var(--bg);font-size:12px;padding:5px 8px;border-radius:6px;opacity:0;transition:opacity .1s;z-index:9;max-width:240px}
.muted{opacity:.12}.semi{opacity:.4}
.foot{font-size:11px;color:var(--sub);margin-top:14px;line-height:1.6}
</style>

function bipartite(left,right,edges,kind){
  svg.selectAll("*").remove();
  const rowH=16, padTop=26, W=760, LX=150, RX=W-150;
  const n=Math.max(left.length,right.length), H=padTop+n*rowH+18;
  svg.attr("viewBox","0 0 "+W+" "+H).attr("width","100%").attr("height",null).attr("preserveAspectRatio","xMinYMin meet");
  left.forEach((d,i)=>d.y=padTop+i*rowH); right.forEach((d,i)=>d.y=padTop+i*rowH);
  const rById={}; right.forEach(d=>rById[d.id]=d); const lById={}; left.forEach(d=>d.on=true,d=>lById[d.id]=d); left.forEach(d=>lById[d.id]=d);
  const vedges=edges.filter(e=>lById[e[0]]&&rById[e[1]]);
  svg.append("text").attr("x",LX).attr("y",14).attr("text-anchor","end").attr("class","hd").text(kind==="genus"?"蝶屬":"蝶種");
  svg.append("text").attr("x",RX).attr("y",14).attr("class","hd").text(kind==="genus"?"寄主植物屬":"寄主植物科");
  const gL=svg.append("g"), gN=svg.append("g");
  const paths=gL.selectAll("path").data(vedges).join("path")
    .attr("fill","none").attr("stroke",FADE).attr("stroke-width",1)
    .attr("d",e=>{const y1=lById[e[0]].y,y2=rById[e[1]].y,m=(LX+RX)/2;return "M"+LX+" "+y1+" C"+m+" "+y1+" "+m+" "+y2+" "+RX+" "+y2;});
  function drawCol(nodes,x,side){
    const g=gN.append("g");
    const nn=g.selectAll("g").data(nodes).join("g");
    nn.append("circle").attr("cx",x).attr("cy",d=>d.y).attr("r",6).attr("fill",d=>d.color||"#9aa17f").attr("stroke","var(--bg)").attr("stroke-width",1.5).style("cursor","pointer");
    const t=nn.append("text").attr("class","node-t").attr("x",side==="L"?x-11:x+11).attr("y",d=>d.y+4).attr("text-anchor",side==="L"?"end":"start");
    t.append("tspan").text(d=>d.label);
    t.filter(d=>d.sub).append("tspan").attr("class","node-s").attr("dx",5).text(d=>d.sub);
    nn.style("cursor","pointer").on("click",(e,d)=>select(d.id,side,kind))
      .on("mousemove",(e,d)=>showTip(d.tip||d.label,e)).on("mouseleave",hideTip);
    return nn;
  }
  const Ln=drawCol(left,LX,"L"), Rn=drawCol(right,RX,"R");
  svg.node().__hl=(id,side)=>{
    const on=new Set(); if(id)on.add(side+":"+id);
    paths.each(function(e){
      const hit=id&&((side==="L"&&e[0]===id)||(side==="R"&&e[1]===id));
      d3.select(this).attr("stroke",hit?HL:FADE).attr("stroke-width",hit?2.4:1).attr("opacity",id?(hit?1:.12):1);
      if(hit){on.add("L:"+e[0]);on.add("R:"+e[1]);}
    });
    Ln.attr("opacity",d=>!id||on.has("L:"+d.id)?1:.2);
    Rn.attr("opacity",d=>!id||on.has("R:"+d.id)?1:.2);
    Ln.select("circle").attr("stroke",d=>(side==="L"&&d.id===id)?"#90B821":"var(--bg)").attr("stroke-width",d=>(side==="L"&&d.id===id)?3:1.5);
    Rn.select("circle").attr("stroke",d=>(side==="R"&&d.id===id)?"#90B821":"var(--bg)").attr("stroke-width",d=>(side==="R"&&d.id===id)?3:1.5);
  };
}

function select(id,side,kind){

    svg.append("rect").attr("x",cx[c.zh]).attr("y",y0+i*cs+1).attr("width",cs-2).attr("height",cs-2).attr("rx",2)
      .attr("fill",FAMCOL[r.fam]).attr("opacity",.85).style("cursor","pointer")
      .on("mousemove",e=>showTip(r.zh+" × "+c.zh,e)).on("mouseleave",hideTip).on("click",()=>select(r.id,"L","bip"));
  }});});
  legend(["列＝蝶種，欄＝寄主科","格子依蝶科著色","整列滿＝廣食性；整欄滿＝關鍵寄主科（如禾本科）"]);
}
function legend(items){ d3.select("#legend").html(items.map(t=>'<span>'+t+'</span>').join('')); }

function render(){
  if(view==="bip") renderBip(); else if(view==="genus") renderGenus(); else renderMatrix();
  if(selected&&view===selected.kind){/*keep*/} else document.getElementById("detail").innerHTML='<div class="sub">點選左側任一節點以檢視其連動與 TaiCoL 分類。</div>';
}
d3.selectAll(".tab").on("click",function(){ d3.selectAll(".tab").classed("on",false); d3.select(this).classed("on",true); view=this.dataset.v; selected=null; render(); });
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim();render();});
document.getElementById("lens").addEventListener("change",e=>{lens=e.target.checked;render();});
famChips();
document.getElementById("foot").innerHTML="資料：iNaturalist（place_id 130869 · taxon 47224 Papilionoidea）× 《臺灣蝶類誌》寄主植物 × TaiCoL 臺灣物種名錄（api.taicol.tw）。"+DATA.meta.n_bf+" 蝶種 · "+DATA.meta.n_fam+" 寄主科 · "+DATA.meta.n_bgen+" 蝶屬 ↔ "+DATA.meta.n_pgen+" 植物屬。寄主科比對以原書明列之科為準；屬／種與特有・受脅標記由 TaiCoL 解析。<br><span style='color:var(--sub)'>蝶名、寄主與分類資料整理自：徐堉峰、黃嘉龍、梁家源（2026）《臺灣蝶類誌》修訂版，農業部林業及自然保育署 © 2026（Hsu, Huang &amp; Liang, <i>Butterfly Fauna of Taiwan</i>, Rev. ed., Forestry and Nature Conservation Agency, Ministry of Agriculture）。本頁僅呈現名稱與取食關係等事實資料。</span>";
render();
